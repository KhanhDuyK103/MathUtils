name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux

    steps:
      - uses: actions/checkout@v4 # Bước 1: Tải code từ GitHub về máy ảo

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Bước 2: Cài đặt Java 17
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package --file pom.xml # Bước 3: Biên dịch và chạy Unit Test

      - name: Run Checkstyle
        run: mvn checkstyle:check # Bước 4: Tự động quét lỗi Google Style

      - name: Upload Test Report
        if: always() # Bước 5: Luôn luôn tải báo cáo lên dù test fail hay pass
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/